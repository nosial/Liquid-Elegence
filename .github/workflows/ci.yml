name: CI Build

on:
  push:
    branches: ['**']
  release:
    types: [published]

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        color: [default, ocean, sunset, forest, berry, slate, ruby, amber, rose, midnight, coral, sage]
        mode: [light, dark]
        layout: [vertical, horizontal]
    name: ${{ matrix.color }}-${{ matrix.mode }}-${{ matrix.layout }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build shared assets
        run: |
          npm run build:vendor
          npm run build:js
          npm run build:assets
          npm run build:variants

      - name: Build variant HTML
        run: node scripts/build-variant-html.js ${{ matrix.color }} ${{ matrix.mode }} ${{ matrix.layout }}

      - name: Create zip archive
        run: |
          cd dist
          zip -r ../${{ matrix.color }}-${{ matrix.mode }}-${{ matrix.layout }}.zip \
            ${{ matrix.color }}-${{ matrix.mode }}-${{ matrix.layout }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.color }}-${{ matrix.mode }}-${{ matrix.layout }}
          path: ${{ matrix.color }}-${{ matrix.mode }}-${{ matrix.layout }}.zip
          if-no-files-found: error
          retention-days: 14

  release:
    if: github.event_name == 'release'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload assets to release
        run: |
          for dir in artifacts/*/; do
            for zip_file in "$dir"*.zip; do
              [ -f "$zip_file" ] || continue
              echo "Uploading: $zip_file"
              gh release upload "${{ github.ref_name }}" "$zip_file"
            done
          done
        env:
          GH_TOKEN: ${{ github.token }}
