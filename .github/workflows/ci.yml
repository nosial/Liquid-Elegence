name: CI Build

on:
  push:
    branches: ['**']
  release:
    types: [published]

env:
  NODE_VERSION: '24'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        color: [default, ocean, sunset, forest, berry, slate, ruby, amber, rose, midnight, coral, sage]
        mode: [light, dark]
        layout: [vertical, horizontal]
    name: ${{ matrix.color }}-${{ matrix.mode }}-${{ matrix.layout }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install

      - name: Build shared assets
        run: |
          npm run build:vendor
          npm run build:js
          npm run build:assets
          npm run build:variants

      - name: Build variant HTML
        run: node scripts/build-variant-html.js ${{ matrix.color }} ${{ matrix.mode }} ${{ matrix.layout }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.color }}-${{ matrix.mode }}-${{ matrix.layout }}
          path: dist/${{ matrix.color }}-${{ matrix.mode }}-${{ matrix.layout }}/
          if-no-files-found: error
          retention-days: 14

  release:
    if: github.event_name == 'release'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Zip and upload assets to release
        run: |
          for dir in artifacts/*/; do
            [ -d "$dir" ] || continue
            variant_name=$(basename "$dir")
            zip -r "${variant_name}.zip" -C "$dir" .
            echo "Uploading: ${variant_name}.zip"
            gh release upload "${{ github.ref_name }}" "${variant_name}.zip"
          done
        env:
          GH_TOKEN: ${{ github.token }}
